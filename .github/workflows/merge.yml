name: Merge Proxies
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Fetch and Merge
        run: |
          mkdir -p subscribe
          curl -s https://raw.githubusercontent.com/sangosbanikz/NoMoreWalls/master/list.txt > nodes1.txt
          curl -s https://raw.githubusercontent.com/sangosbanikz/V2RayAggregator/master/Eternity.txt > nodes2.txt
          curl -s https://raw.githubusercontent.com/sangosbanikz/v2ray/master/merge/merge.txt > nodes3.txt
          curl -s https://raw.githubusercontent.com/sangosbanikz/get_subscribe/main/subscribe/v2ray.txt > nodes4.txt
          cat nodes1.txt nodes2.txt nodes3.txt nodes4.txt | sort -u > subscribe/v2ray.txt
          echo "Merged $(wc -l < subscribe/v2ray.txt) unique nodes."
      - name: Commit and push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add subscribe/v2ray.txt
          git commit -m "Auto-update merged nodes: $(date)" || exit 0
          git push
