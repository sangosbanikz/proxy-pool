name: Merge Proxies
on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch all sources
        run: |
          mkdir -p subscribe
          echo "=== Proxy Pool $(date '+%Y-%m-%d %H:%M UTC') ==="
          curl -sL --max-time 30 https://raw.githubusercontent.com/sangosbanikz/NoMoreWalls/master/list.txt -o n1.txt || true
          S1=$(wc -c < n1.txt 2>/dev/null || echo 0)
          echo "[1] NoMoreWalls: ${S1} bytes"
          curl -sL --max-time 30 https://raw.githubusercontent.com/sangosbanikz/V2RayAggregator/master/Eternity.txt -o n2.txt || true
          S2=$(grep -c '' n2.txt 2>/dev/null || echo 0)
          echo "[2] V2RayAggregator: ${S2} lines"
          curl -sL --max-time 30 https://raw.githubusercontent.com/sangosbanikz/v2ray/master/merge/merge.txt -o n3.txt || true
          S3=$(grep -c '' n3.txt 2>/dev/null || echo 0)
          echo "[3] mfuu/v2ray: ${S3} lines"
          curl -sL --max-time 30 https://raw.githubusercontent.com/sangosbanikz/get_subscribe/main/subscribe/v2ray.txt -o n4.txt || true
          S4=$(grep -c '' n4.txt 2>/dev/null || echo 0)
          echo "[4] get_subscribe: ${S4} lines"
          cat n1.txt n2.txt n3.txt n4.txt 2>/dev/null | grep -v '^$' | sort -u > subscribe/v2ray.txt
          TOTAL=$(wc -l < subscribe/v2ray.txt)
          echo "Merged: ${TOTAL} unique lines"

      - name: Install LiteSpeedTest
        run: |
          wget -q https://github.com/xxf098/LiteSpeedTest/releases/download/v0.15.0/lite-linux-amd64-v0.15.0.gz
          gunzip lite-linux-amd64-v0.15.0.gz
          chmod +x lite-linux-amd64-v0.15.0
          mv lite-linux-amd64-v0.15.0 /usr/local/bin/lite
          echo "LiteSpeedTest installed"

      - name: Test nodes alive
        run: |
          echo '{"group":"proxypool","speedtestMode":"pingonly","pingMethod":"googleping","sortMethod":"rping","concurrency":8,"testMode":2,"timeout":10,"unique":true,"outputMode":4}' > test_config.json
          lite --config test_config.json --test subscribe/v2ray.txt > alive_raw.txt 2>/dev/null || true
          grep -E '^(vmess|vless|ss|ssr|trojan)://' alive_raw.txt > subscribe/alive.txt 2>/dev/null || true
          ALIVE=$(wc -l < subscribe/alive.txt 2>/dev/null || echo 0)
          echo "Alive nodes: ${ALIVE}"

      - name: IP quality check
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, time, re, base64, sys

          def extract_ips(filename):
              ips = set()
              try:
                  with open(filename) as f:
                      for line in f:
                          line = line.strip()
                          if not line:
                              continue
                          found = re.findall(r'(?:@|"add"\s*:\s*")([0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3})', line)
                          ips.update(found)
                          if '://' in line:
                              parts = line.split('://', 1)
                              if len(parts) > 1:
                                  try:
                                      decoded = base64.b64decode(parts[1] + '==').decode('utf-8', errors='ignore')
                                      found2 = re.findall(r'([0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3})', decoded)
                                      ips.update(found2)
                                  except:
                                      pass
              except:
                  pass
              return list(ips)[:40]

          def check_ip(ip):
              try:
                  url = f"http://ip-api.com/json/{ip}?fields=status,country,countryCode,regionName,city,isp,org,as,proxy,hosting,mobile,query"
                  req = urllib.request.Request(url)
                  with urllib.request.urlopen(req, timeout=10) as resp:
                      return json.load(resp)
              except:
                  return {"status": "fail", "query": ip}

          ips = extract_ips('subscribe/alive.txt')
          if not ips:
              ips = extract_ips('subscribe/v2ray.txt')

          print(f"Checking {len(ips)} unique IPs...")
          results = []
          for i, ip in enumerate(ips):
              r = check_ip(ip)
              results.append(r)
              label = "Residential" if not r.get("hosting", True) else "Datacenter"
              risk = "PROXY" if r.get("proxy", False) else "Clean"
              print(f"  [{i+1}/{len(ips)}] {ip} | {r.get('country','?')} | {r.get('isp','?')} | {label} | {risk}")
              time.sleep(1.5)

          report = {
              "timestamp": time.strftime("%Y-%m-%d %H:%M:%S UTC"),
              "total_ips_checked": len(results),
              "results": results,
              "summary": {
                  "residential": sum(1 for r in results if not r.get("hosting", True)),
                  "datacenter": sum(1 for r in results if r.get("hosting", False)),
                  "proxy_flagged": sum(1 for r in results if r.get("proxy", False)),
