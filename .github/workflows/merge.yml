name: Merge Proxies
on:
  schedule:
      - cron: '0 */1 * * *'
        workflow_dispatch:

        jobs:
          merge:
              runs-on: ubuntu-latest
                  steps:
                        - name: Checkout
                                uses: actions/checkout@v4

                                      - name: Fetch and Merge with Logging
                                              run: |
                                                        mkdir -p subscribe

                                                                  echo "========================================" 
                                                                            echo "Proxy Pool Aggregator - $(date '+%Y-%m-%d %H:%M:%S UTC')"
                                                                                      echo "========================================"

                                                                                                # Source 1: NoMoreWalls
                                                                                                          curl -sL https://raw.githubusercontent.com/sangosbanikz/NoMoreWalls/master/list.txt -o nodes1.txt || true
                                                                                                                    S1=$(grep -c '' nodes1.txt 2>/dev/null || echo 0)
                                                                                                                              echo "[Source 1] NoMoreWalls: $S1 nodes"
                                                                                                                              
                                                                                                                                        # Source 2: V2RayAggregator
                                                                                                                                                  curl -sL https://raw.githubusercontent.com/sangosbanikz/V2RayAggregator/master/Eternity.txt -o nodes2.txt || true
                                                                                                                                                            S2=$(grep -c '' nodes2.txt 2>/dev/null || echo 0)
                                                                                                                                                                      echo "[Source 2] V2RayAggregator: $S2 nodes"
                                                                                                                                                                      
                                                                                                                                                                                # Source 3: mfuu/v2ray
                                                                                                                                                                                          curl -sL https://raw.githubusercontent.com/sangosbanikz/v2ray/master/merge/merge.txt -o nodes3.txt || true
                                                                                                                                                                                                    S3=$(grep -c '' nodes3.txt 2>/dev/null || echo 0)
                                                                                                                                                                                                              echo "[Source 3] mfuu/v2ray: $S3 nodes"
                                                                                                                                                                                                              
                                                                                                                                                                                                                        # Source 4: get_subscribe
                                                                                                                                                                                                                                  curl -sL https://raw.githubusercontent.com/sangosbanikz/get_subscribe/main/subscribe/v2ray.txt -o nodes4.txt || true
                                                                                                                                                                                                                                            S4=$(grep -c '' nodes4.txt 2>/dev/null || echo 0)
                                                                                                                                                                                                                                                      echo "[Source 4] get_subscribe: $S4 nodes"
                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                # Merge and deduplicate
                                                                                                                                                                                                                                                                          cat nodes1.txt nodes2.txt nodes3.txt nodes4.txt 2>/dev/null | grep -v '^$' | sort -u > subscribe/v2ray.txt
                                                                                                                                                                                                                                                                                    TOTAL=$(wc -l < subscribe/v2ray.txt)
                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                              echo "========================================"
                                                                                                                                                                                                                                                                                                        echo "TOTAL before dedup: $((S1+S2+S3+S4))"
                                                                                                                                                                                                                                                                                                                  echo "TOTAL after dedup: $TOTAL"
                                                                                                                                                                                                                                                                                                                            echo "========================================"
                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                      # Write log file
                                                                                                                                                                                                                                                                                                                                                {
                                                                                                                                                                                                                                                                                                                                                            echo "Last updated: $(date '+%Y-%m-%d %H:%M:%S UTC')"
                                                                                                                                                                                                                                                                                                                                                                        echo ""
                                                                                                                                                                                                                                                                                                                                                                                    echo "Source Statistics:"
                                                                                                                                                                                                                                                                                                                                                                                                echo "  [1] NoMoreWalls:      $S1 nodes"
                                                                                                                                                                                                                                                                                                                                                                                                            echo "  [2] V2RayAggregator:  $S2 nodes"
                                                                                                                                                                                                                                                                                                                                                                                                                        echo "  [3] mfuu/v2ray:       $S3 nodes"
                                                                                                                                                                                                                                                                                                                                                                                                                                    echo "  [4] get_subscribe:    $S4 nodes"
                                                                                                                                                                                                                                                                                                                                                                                                                                                echo ""
                                                                                                                                                                                                                                                                                                                                                                                                                                                            echo "Total (raw):   $((S1+S2+S3+S4))"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        echo "Total (dedup): $TOTAL"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  } > subscribe/log.txt
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - name: Commit and push
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          git config --global user.name "GitHub Action"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    git config --global user.email "action@github.com"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              git add -A
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        git diff --cached --quiet && echo "keepalive: $(date)" >> subscribe/log.txt && git add -A
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  git commit -m "Auto-update merged nodes: $(date '+%Y-%m-%d %H:%M')" || true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            git push || true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
